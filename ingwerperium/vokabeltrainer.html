<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title data-de="Vokabeltrainer von Lukas Ohlemutz" data-en="Vocabulary Trainer by Lukas Ohlemutz">Vokabeltrainer</title>

<style>
body { margin:0; background:#111; color:white; font-family:sans-serif; }
#top { padding:10px; background:#222; display:flex; gap:10px; align-items:center; }
button { padding:6px 12px; }
#answerInput { padding:6px; font-size:16px; width:200px; }
#editorBox { display:none; position:fixed; top:10%; left:10%; width:80%; height:80%;
             background:white; color:black; border-radius:8px; padding:10px; }
#editor { width:100%; height:90%; font-size:16px; }
#gameCanvas { width:100vw; height:80vh; background:black; display:block; }
#redbar { width:100vw; height:40px; background:#550000; }
#answerDisplay { position:fixed; bottom:50px; left:0; width:100%; text-align:center; font-size:22px; color:red; }
</style>
</head>

<body>

<div id="top">
<button id="editBtn" data-de="TXT" data-en="TXT">TXT</button>
<button id="speedBtn" data-de="Start" data-en="Start">Start</button>
<input id="answerInput"
       data-de-placeholder="Antwort eingeben…"
       data-en-placeholder="Enter answer…"
       placeholder="Antwort eingeben…">
</div>

<div id="editorBox">
<textarea id="editor"
data-de-placeholder="Gib erst die Frage ein in eine Zeile, trenne dann mit = Frage und Antwort"
data-en-placeholder="Write the question, then use = to separate question and answer"></textarea>
<br>
<button id="closeEditor"
data-de="Speichern & Schließen"
data-en="Save & Close">Speichern & Schließen</button>
</div>

<canvas id="gameCanvas"></canvas>
<div id="redbar"></div>
<div id="answerDisplay"></div>

<script>
// 🌍 LANGUAGE SYSTEM
// Prüfen, ob Sprache aus localStorage übernommen werden kann
window.LANG = localStorage.getItem('lang') || 'de';

// Funktion, die alle Texte und Placeholder übersetzt
function applyPlaceholders(){
  const lang = window.LANG || 'de';

  // Placeholders
  document.querySelectorAll('[data-de-placeholder]').forEach(el=>{
    el.placeholder = el.getAttribute(`data-${lang}-placeholder`);
  });

  // Buttons und sonstige Texte
  document.querySelectorAll('[data-de]').forEach(el=>{
    el.innerText = el.getAttribute(`data-${lang}`);
  });

  // Title
  const titleEl = document.querySelector('title');
  if(titleEl && titleEl.getAttribute(`data-${lang}`)){
    titleEl.innerText = titleEl.getAttribute(`data-${lang}`);
  }
}

// Sprache wechseln (optional Funktion)
function setLanguage(lang){
  window.LANG = lang;
  localStorage.setItem('lang', lang);
  applyPlaceholders();
}

// Initial anwenden
document.addEventListener('DOMContentLoaded', applyPlaceholders);
setTimeout(applyPlaceholders, 50);

// --- GAME LOGIC ---
let speed = 0;
let vocab = [];
let active = [];
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");
let W,H;

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight * 0.8;
  W = canvas.width; H = canvas.height;
}
resize();
window.onresize = resize;

// --- TXT Editor ---
document.getElementById("editBtn").onclick = ()=> {
  document.getElementById("editorBox").style.display="block";
};

document.getElementById("closeEditor").onclick = ()=>{
  let t = document.getElementById("editor").value.split(/\n/);
  vocab=[];
  for(let l of t){
    let p = l.split("=");
    if(p.length>=2){
      vocab.push({q:p[0].trim(), a:p[1].trim()});
    }
  }
  document.getElementById("editorBox").style.display="none";
};

// --- Speed Button ---
document.getElementById("speedBtn").onclick = function(){
  speed++;
  if(speed>10) speed=0;
  const lang = window.LANG || 'de';
  if(speed === 0){
    this.innerText = lang === "en" ? "Start" : "Start";
  } else {
    this.innerText = (lang === "en" ? "Speed: " : "Geschwindigkeit: ") + speed;
  }
};

// --- Answer Input ---
document.getElementById("answerInput").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    let val = this.value.trim().toLowerCase();
    let targetIndex = -1;
    let maxY = -1;
    for (let i = 0; i < active.length; i++) {
      if (active[i].a.toLowerCase() === val && active[i].y > maxY) {
        maxY = active[i].y;
        targetIndex = i;
      }
    }
    if (targetIndex !== -1) {
      active.splice(targetIndex, 1);
    }
    this.value = "";
  }
});

// --- TEXT WRAP ---
function wrapText(text, x, y, maxWidth, lineHeight) {
  let words = text.split(" ");
  let line = "";
  let lines = [];
  for (let w of words) {
    let testLine = line + w + " ";
    let testWidth = ctx.measureText(testLine).width;
    if (testWidth > maxWidth && line !== "") {
      lines.push(line);
      line = w + " ";
    } else {
      line = testLine;
    }
  }
  lines.push(line);
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], x, y + i * lineHeight);
  }
  return lines.length;
}

// --- Overlap ---
function isOverlapping(x, maxWidth){
  for(let a of active){
    let otherWidth = a.maxWidth;
    if(!(x + maxWidth < a.x || x > a.x + otherWidth)) return true;
  }
  return false;
}

// --- Spawn ---
function spawn(){
  if(speed===0) return;
  if(active.length >= speed) return;
  if(vocab.length===0) return;
  let v = vocab[Math.floor(Math.random()*vocab.length)];
  let maxWidth = 180;
  for(let tries=0; tries<20; tries++){
    let x = Math.random() * (W - maxWidth - 20) + 10;
    if(!isOverlapping(x, maxWidth)){
      active.push({
        q:v.q, a:v.a,
        x:x,
        y: 0,
        maxWidth: maxWidth,
        speed: H/5500000
      });
      return;
    }
  }
}

// --- LOOP ---
function loop(){
  ctx.clearRect(0,0,W,H);
  if(active.length < speed && speed>0){
    spawn();
  }
  ctx.fillStyle = "white";
  ctx.font="20px sans-serif";
  for(let i=active.length-1;i>=0;i--){
    let a = active[i];
    let lineHeight = 22;
    let lineCount = wrapText(a.q, a.x, a.y, a.maxWidth, lineHeight);
    a.y += a.speed * (H/2) * lineCount;
    if(a.y > H){
      flash();
      showAnswer(a.a);
      active.splice(i,1);
    }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// --- Flash ---
function flash(){
  let rb = document.getElementById("redbar");
  rb.style.background="#ff0000";
  setTimeout(()=>rb.style.background="#550000",150);
}

// --- Show Answer ---
function showAnswer(txt){
  let ad = document.getElementById("answerDisplay");
  ad.innerText = txt;
  setTimeout(()=>{ if(ad.innerText===txt) ad.innerText=""; },10000);
}

</script>

</body>
</html>
