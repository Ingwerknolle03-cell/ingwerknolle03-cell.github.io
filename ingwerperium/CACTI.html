<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingwerperium🌵cacti</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #c9933a; }
#gc { display: block; width: 100%; }
#overlay { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#c9933a; font-family:'Courier New',monospace; }
#win-screen { display:none; position:absolute; top:0; left:0; width:100%; height:100%; flex-direction:column; align-items:center; justify-content:center; background:rgba(201,147,58,0.95); font-family:'Courier New',monospace; }
h1 { font-size:clamp(28px,6vw,56px); color:#1a3d0a; letter-spacing:4px; text-shadow:3px 3px 0 #7a4a10; margin-bottom:6px; }
.sub { font-size:clamp(11px,2vw,15px); color:#2d5a1b; letter-spacing:3px; margin-bottom:24px; }
.btn { background:#1a3d0a; color:#c9933a; border:none; padding:12px 32px; font-size:clamp(13px,2.2vw,18px); font-family:'Courier New',monospace; cursor:pointer; letter-spacing:2px; margin:5px; border-radius:3px; }
.btn:hover { background:#2d6b15; }
.hint { font-size:11px; color:#2d5a1b; text-align:center; line-height:2; letter-spacing:1px; margin-top:16px; }
#touch-controls { position: absolute; bottom: 20px; left: 20px; right: 20px; display: none; flex-direction: row; justify-content: space-between; align-items: flex-end; pointer-events: none; z-index: 100; }
.touch-btn { width:72px; height:72px; border-radius:50%; background:rgba(26,93,10,0.8); border:3px solid #c9933a; display:flex; align-items:center; justify-content:center; font-size:22px; color:#c9933a; font-weight:bold; font-family:'Courier New',monospace; cursor:pointer; pointer-events:auto; }
.touch-btn:active { background:rgba(45,107,21,0.9); transform:scale(0.95); }
#win-msg { font-size:clamp(20px,4.5vw,40px); color:#1a3d0a; margin-bottom:20px; letter-spacing:2px; text-align:center; padding:0 20px; }
</style>
</head>
<body>
<div style="position:relative;width:100%;height:100vh;overflow:hidden;background:#c9933a;">
<canvas id="gc" width="800" height="600" style="width:100%;height:100vh;"></canvas>
<div id="overlay">
  <h1>🌵 CACTI 🌵</h1>
  <div class="sub">INGWERPERIUM</div>
  <button class="btn" onclick="startGame('sp')">SINGLEPLAYER</button>
  <button class="btn" onclick="startGame('pvp')"> ㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ2 PLAYERㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤㅤ </button>
  <div class="hint">
    PC: ← → move cactus · Blocks fall automatically<br>
    2 Player: P.1 = A / D &nbsp;|&nbsp; P.2 = ← / →<br>
    <br>
    🌸
  </div>
</div>
<div id="win-screen">
  <div id="win-msg"></div>
  <button class="btn" onclick="resetGame()">↺</button>
</div>
<div id="touch-controls">
  <div><div class="touch-btn" id="touch-left">←</div></div>
  <div><div class="touch-btn" id="touch-right">→</div></div>
</div>
</div>

<script>
(function(){

let audioCtx = null;
let musicNodes = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playPlop(pan) {
  const ac = getAudio();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  const panner = ac.createStereoPanner ? ac.createStereoPanner() : null;

  osc.type = 'sine';
  osc.frequency.setValueAtTime(260, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(90, ac.currentTime + 0.12);

  gain.gain.setValueAtTime(0.55, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);

  osc.connect(gain);
  if (panner) {
    panner.pan.value = Math.max(-1, Math.min(1, pan || 0));
    gain.connect(panner);
    panner.connect(ac.destination);
  } else {
    gain.connect(ac.destination);
  }
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.2);
}

function playCrystal(pan) {
  const ac = getAudio();
  const master = ac.createGain();
  const panner = ac.createStereoPanner ? ac.createStereoPanner() : null;
  master.gain.setValueAtTime(0.45, ac.currentTime);
  master.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.4);

  const partials = [
    {freq: 1047, gain: 0.5},
    {freq: 1568, gain: 0.35},
    {freq: 2093, gain: 0.2},
    {freq: 2637, gain: 0.12},
    {freq: 3520, gain: 0.07},
  ];

  for (const p of partials) {
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'sine';

    osc.frequency.value = p.freq * (1 + (Math.random() - 0.5) * 0.004);
    g.gain.setValueAtTime(p.gain, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.2);
    osc.connect(g);
    g.connect(master);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 1.5);
  }


  const lfo = ac.createOscillator();
  const lfoGain = ac.createGain();
  lfo.frequency.value = 14;
  lfoGain.gain.value = 0.06;
  lfo.connect(lfoGain);
  lfoGain.connect(master.gain);
  lfo.start(ac.currentTime);
  lfo.stop(ac.currentTime + 1.5);

  if (panner) {
    panner.pan.value = Math.max(-1, Math.min(1, pan || 0));
    master.connect(panner);
    panner.connect(ac.destination);
  } else {
    master.connect(ac.destination);
  }
}


function startMusic() {
  if (musicNodes) return;
  const ac = getAudio();
  const masterGain = ac.createGain();
  masterGain.gain.value = 0.18;
  masterGain.connect(ac.destination);

  const scale = [293.66, 329.63, 369.99, 440.00, 493.88, 587.33, 659.26, 739.99];
  const bassDrums = [73.42, 110.00]; // D2, A2

  let step = 0;
  let bassStep = 0;
  const BPM = 72;
  const beat = 60 / BPM;

  function scheduleMelodyNote(time) {
    const freq = scale[Math.floor(Math.random() * scale.length)];
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(0.4, time + 0.04);
    g.gain.exponentialRampToValueAtTime(0.001, time + beat * 1.8);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(time);
    osc.stop(time + beat * 2);
  }

  function scheduleBassNote(time) {
    const freq = bassDrums[bassStep % bassDrums.length];
    bassStep++;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0.6, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + beat * 0.7);
    osc.connect(g);
    g.connect(masterGain);
    osc.start(time);
    osc.stop(time + beat);
  }


  let nextNoteTime = ac.currentTime + 0.1;
  let nextBassTime = ac.currentTime + 0.1;
  let melodyEvery = 2; // Melody alle 2 Beats
  let melodyCount = 0;

  const intervalId = setInterval(() => {
    if (!musicNodes) { clearInterval(intervalId); return; }
    const lookAhead = 0.3;
    while (nextNoteTime < ac.currentTime + lookAhead) {
      if (melodyCount % melodyEvery === 0) scheduleMelodyNote(nextNoteTime);
      melodyCount++;
      nextNoteTime += beat;
    }
    while (nextBassTime < ac.currentTime + lookAhead) {
      scheduleBassNote(nextBassTime);
      nextBassTime += beat * 2;
    }
  }, 80);

  musicNodes = { masterGain, intervalId };
}

function stopMusic() {
  if (!musicNodes) return;
  clearInterval(musicNodes.intervalId);
  try {
    musicNodes.masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
  } catch(e){}
  musicNodes = null;
}


const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const CW=800, CH=600, BW=46, BH=38, FALL_SPEED=1.5;
const CACTUS_COLORS=['#1a5c0a','#2d7a15','#3d9c1e','#145209','#1f6b0d'];
const FLOWER_COLS=['#ff1493','#ff69b4','#ff44aa','#ff0066','#ff6600','#ffcc00'];
const SAND='#c9933a', GROUND_Y=CH-55;
const MOVE_SPEED=4.5;

let worlds=[], mode=null, running=false, raf=null, gameTime=0;
const keys={}, touchKeys={left:false,right:false};
let spBestHeight=0;

try {
  const saved=localStorage.getItem('kaktus_sp');
  if(saved){const d=JSON.parse(saved);spBestHeight=d.bestHeight||0;}
} catch(e){}

const isMobile=/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

class FallingBlock {
  constructor(worldW,camY){
    this.w=BW; this.h=BH;
    this.x=Math.random()*(worldW-this.w);
    this.y=camY-CH-BH;
    this.vy=FALL_SPEED+Math.random()*0.8;
    this.color=CACTUS_COLORS[Math.floor(Math.random()*CACTUS_COLORS.length)];
  }
}

class Flower {
  constructor(stackIndex, offsetX, blockY, color){
    this.stackIndex = stackIndex;
    this.offsetX = offsetX;
    this.blockY = blockY;
    this.color = color;
    this.size = 5+Math.random()*4;
    this.pulse = Math.random()*Math.PI*2;
    this.life = 1600;
  }
}

class World {
  constructor(ox,ww,name,lk,rk){
    this.ox=ox; this.ww=ww; this.name=name; this.lk=lk; this.rk=rk;
    this.score=0; this.camY=0; this.shake=0;
    this.particles=[]; this.flowers=[]; this.spawnTimer=100;
    this.missedBlock=0; this.missCooldown=0; this.gameOver=false;
    this.stack=[{x:(ww-BW)/2,y:GROUND_Y,w:BW,h:BH,color:'#1a3d0a',isBase:true}];
    this.falling=[];
  }
  topBlock(){return this.stack[this.stack.length-1];}
  height(){return this.stack.length-1;}

  update(){
    if(this.gameOver)return;
    this.shake*=0.8;
    const top=this.topBlock();
    const targetCam=top.y-CH*0.38;
    this.camY+=(targetCam-this.camY)*0.08;

    if(keys[this.lk]||touchKeys.left) top.x-=MOVE_SPEED;
    if(keys[this.rk]||touchKeys.right) top.x+=MOVE_SPEED;
    top.x=Math.max(0,Math.min(this.ww-top.w,top.x));

    for(let i=this.stack.length-2;i>=0;i--){
      this.stack[i].x+=(this.stack[i+1].x-this.stack[i].x)*0.6;
      this.stack[i].x=Math.max(0,Math.min(this.ww-this.stack[i].w,this.stack[i].x));
    }

    if(this.missCooldown>0)this.missCooldown--;

    this.spawnTimer--;
    if(this.spawnTimer<=0){
      this.falling.push(new FallingBlock(this.ww,this.camY));
      this.spawnTimer=Math.max(40,140-this.stack.length*4+Math.random()*40);
    }

    for(let i=this.falling.length-1;i>=0;i--){
      const fb=this.falling[i];
      fb.y+=fb.vy;
      const top=this.topBlock();
      const overlapX=Math.min(fb.x+fb.w,top.x+top.w)-Math.max(fb.x,top.x);

      if(overlapX>fb.w*0.25&&fb.y+fb.h>=top.y&&fb.y<top.y){
        fb.y=top.y-fb.h;
        const newIndex=this.stack.length;
        this.stack.push({x:fb.x,y:fb.y,w:fb.w,h:fb.h,color:fb.color,isBase:false});
        this.falling.splice(i,1);
        this.score++;
        this.shake=3;
        this.spawnParticles(fb.x+fb.w/2,fb.y,fb.color);
        this.saveSP();

        // Plop-Sound – Pan je nach x-Position in der Welt
        const pan = ((fb.x + fb.w/2) / this.ww) * 2 - 1;
        playPlop(pan * 0.6);

     
        if(Math.random()<0.20){
          const offsetX=Math.random()*(fb.w-8)+2;
          this.flowers.push(new Flower(newIndex, offsetX, fb.y,
            FLOWER_COLS[Math.floor(Math.random()*FLOWER_COLS.length)]));
        
          playCrystal(pan * 0.5);
        }
      } else if(fb.y>GROUND_Y+100){
        this.falling.splice(i,1);
        if(this.missCooldown<=0){this.missedBlock++;this.missCooldown=180;}
      }
    }

    this.flowers=this.flowers.filter(f=>{ f.pulse+=0.1; f.life--; return f.life>0; });
    this.particles=this.particles.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--; return p.life>0; });
  }

  saveSP(){
    if(mode!=='sp')return;
    if(this.height()>spBestHeight)spBestHeight=this.height();
    try{localStorage.setItem('kaktus_sp',JSON.stringify({bestHeight:spBestHeight}));}catch(e){}
  }

  spawnParticles(x,y,color){
    for(let i=0;i<8;i++){
      this.particles.push({x:this.ox+x,y:y-this.camY,vx:(Math.random()-0.5)*4,vy:-(Math.random()*3+1),color,life:25+Math.random()*15});
    }
  }

  draw(){
    ctx.save();
    ctx.beginPath();
    ctx.rect(this.ox,0,this.ww,CH);
    ctx.clip();
    const sx=this.shake?(Math.random()-0.5)*this.shake:0;
    ctx.translate(this.ox+sx,0);

    ctx.fillStyle=SAND; ctx.fillRect(0,0,this.ww,CH);
    ctx.fillStyle='#7a4a10'; ctx.fillRect(0,GROUND_Y-this.camY,this.ww,CH-GROUND_Y+60);
    ctx.fillStyle='#8B5E1A'; ctx.fillRect(0,GROUND_Y-this.camY,this.ww,12);

    for(const b of this.stack) this.drawCactus(b.x,b.y-this.camY,b.w,b.h,b.color,b.isBase);

    for(const f of this.flowers){
      const block=this.stack[f.stackIndex];
      if(!block) continue;
      const fx=block.x+f.offsetX;
      const fy=f.blockY-this.camY;
      const s=f.size*(1+Math.sin(f.pulse)*0.15);
      const alpha=Math.min(1,f.life/80);
      ctx.globalAlpha=alpha;
      ctx.fillStyle=f.color;
      for(let i=0;i<5;i++){
        const a=(i/5)*Math.PI*2-Math.PI/2;
        ctx.beginPath();
        ctx.arc(fx+Math.cos(a)*s*1.2,fy+Math.sin(a)*s*1.2,s*0.65,0,Math.PI*2);
        ctx.fill();
      }
      ctx.fillStyle='#ffffff';
      ctx.beginPath();
      ctx.arc(fx,fy,s*0.45,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    }

    for(const fb of this.falling){
      const screenY=fb.y-this.camY;
      if(screenY>-BH*2){
        this.drawCactus(fb.x,screenY,fb.w,fb.h,fb.color,false);
        const top=this.topBlock();
        const overlapX=Math.min(fb.x+fb.w,top.x+top.w)-Math.max(fb.x,top.x);
        if(overlapX>fb.w*0.5&&fb.y<top.y+20){
          ctx.fillStyle='rgba(0,0,0,0.18)';
          ctx.fillRect(Math.max(fb.x,top.x),top.y-this.camY-3,overlapX,3);
        }
      }
    }

    for(const p of this.particles){
      ctx.globalAlpha=p.life/40;
      ctx.fillStyle=p.color;
      ctx.fillRect(p.x-this.ox-3,p.y-3,6,6);
    }
    ctx.globalAlpha=1;

    ctx.fillStyle='#1a3d0a';
    ctx.font='bold 14px Courier New'; ctx.textAlign='left';
    ctx.fillText(`${this.name}  Height: ${this.height()}`,8,24);
    if(mode==='sp'){
      ctx.font='12px Courier New';
      ctx.fillStyle='#7a4a10';
      ctx.fillText(`Rekord: ${spBestHeight}`,8,42);
    } else if(mode==='pvp'){
      ctx.font='12px Courier New';
      ctx.fillStyle='#cc2200';
      ctx.fillText(`${Math.min(this.missedBlock,20)}/20`,8,42);
    }
    ctx.restore();
  }

  drawCactus(x,y,w,h,color,isBase){
    ctx.fillStyle=color; ctx.fillRect(x,y,w,h);
    ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.fillRect(x+1,y+1,w-2,6);
    ctx.fillStyle='rgba(0,0,0,0.2)';
    for(let i=1;i<3;i++) ctx.fillRect(x+w*i/3-1,y+4,2,h-8);
    if(!isBase){
      ctx.fillStyle='#a0e060';
      for(let row=0;row<2;row++){
        const sy=y+(row+1)*h/3;
        ctx.fillRect(x-6,sy-1,6,2); ctx.fillRect(x+w,sy-1,6,2);
      }
    }
    ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=1.5; ctx.strokeRect(x,y,w,h);
  }
}

function startGame(m){
  mode=m; gameTime=0;
  document.getElementById('overlay').style.display='none';
  document.getElementById('touch-controls').style.display=isMobile?'flex':'none';
  worlds=m==='pvp'
    ?[new World(0,400,'P1','a','d'),new World(400,400,'P2','ArrowLeft','ArrowRight')]
    :[new World(0,800,'Du','ArrowLeft','ArrowRight')];
  running=true;
  if(raf)cancelAnimationFrame(raf);
  // AudioContext erst nach User-Geste starten
  getAudio().resume().then(startMusic);
  lastTime=performance.now();
  loop(lastTime);
}

let lastTime=0;
function loop(time){
  if(!running)return;
  gameTime+=(time-lastTime)/16.67;
  lastTime=time;
  ctx.clearRect(0,0,CW,CH);
  worlds.forEach(w=>w.update());
  worlds.forEach(w=>w.draw());

  if(mode==='pvp'){
    ctx.fillStyle='#1a3d0a'; ctx.fillRect(400,0,2,CH);
    const totalSecs=Math.floor(gameTime/60);
    const mins=Math.floor(totalSecs/60);
    const secs=totalSecs%60;
    ctx.fillStyle='#1a3d0a';
    ctx.font='bold 13px Courier New'; ctx.textAlign='center';
    ctx.fillText(`${mins}:${secs.toString().padStart(2,'0')}`,400,18);

    const deadPlayers=worlds.filter(w=>w.missedBlock>=20);
    if(deadPlayers.length>0){
      running=false;
      stopMusic();
      const alive=worlds.filter(w=>w.missedBlock<20);
      let msg;
      if(alive.length===1){
        msg=`${alive[0].name} WINS! (Height: ${alive[0].height()})`;
      } else {
        const sorted=[...worlds].sort((a,b)=>b.height()-a.height());
        msg=sorted[0].height()===sorted[1].height()
          ?'DRAW!'
          :`${sorted[0].name} WINS! (Height: ${sorted[0].height()})`;
      }
      document.getElementById('win-msg').textContent='🌵 '+msg+' 🌵';
      document.getElementById('win-screen').style.display='flex';
      return;
    }
    if(gameTime>18000){
      running=false;
      stopMusic();
      const sorted=[...worlds].sort((a,b)=>b.height()-a.height());
      const msg=sorted[0].height()===sorted[1].height()
        ?'DRAW!'
        :`${sorted[0].name} WINS! (Height: ${sorted[0].height()})`;
      document.getElementById('win-msg').textContent='🌵 '+msg+' 🌵';
      document.getElementById('win-screen').style.display='flex';
      return;
    }
  }
  raf=requestAnimationFrame(loop);
}

function resetGame(){
  running=false; gameTime=0; worlds=[];
  if(raf)cancelAnimationFrame(raf);
  stopMusic();
  document.getElementById('win-screen').style.display='none';
  document.getElementById('overlay').style.display='flex';
  document.getElementById('touch-controls').style.display='none';
  touchKeys.left=false; touchKeys.right=false;
}

['touch-left','touch-right'].forEach((id,i)=>{
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();touchKeys[i?'right':'left']=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();touchKeys[i?'right':'left']=false;},{passive:false});
});

window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=keys[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=keys[e.key]=false; });
document.addEventListener('touchstart',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});
let lastTouchEnd=0;
document.addEventListener('touchend',e=>{
  const now=Date.now();
  if(now-lastTouchEnd<=300)e.preventDefault();
  lastTouchEnd=now;
},{passive:false});

window.startGame=startGame;
window.resetGame=resetGame;
})();
</script>
</body>
</html>
