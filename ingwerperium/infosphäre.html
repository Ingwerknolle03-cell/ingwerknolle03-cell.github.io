<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfoSphäre – Ingwerperium Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #17171f;
  --surface3: #1e1e2a;
  --border: rgba(255,255,255,0.07);
  --accent: #7c5cfc;
  --accent2: #00d4ff;
  --text: #e8e8f0;
  --text-muted: #888898;
  --text-dim: #555566;
  --glow: rgba(124,92,252,0.3);
  --radius: 16px;
  --radius-sm: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(124,92,252,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 90% 90%, rgba(0,212,255,0.05) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ─── */
header {
  position: relative;
  z-index: 100;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10,10,15,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.header-logo {
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: color 0.2s;
}

.header-logo:hover { color: var(--text); }

.header-logo-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 2s infinite;
}

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.header-title {
  font-family: 'Space Mono', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.03em;
  padding-left: 20px;
  border-left: 1px solid var(--border);
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-btn {
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}

.nav-btn:hover {
  border-color: var(--accent);
  color: var(--text);
  background: rgba(124,92,252,0.1);
}

.lang-toggle-btn {
  padding: 6px 12px;
  border: 1px solid var(--accent);
  border-radius: 8px;
  background: rgba(124,92,252,0.12);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
}

.lang-toggle-btn:hover {
  background: rgba(124,92,252,0.25);
  box-shadow: 0 0 14px var(--glow);
}

/* ─── MAIN LAYOUT ─── */
#app {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ─── SIDEBAR ─── */
#sidebar {
  width: 280px;
  min-width: 260px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
  flex-shrink: 0;
}

.sidebar-search-wrap {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-box {
  position: relative;
}

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 0.85rem;
  pointer-events: none;
}

#searchInput {
  width: 100%;
  padding: 10px 12px 10px 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.875rem;
  outline: none;
  transition: border-color 0.2s ease;
}

#searchInput:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,92,252,0.1);
}

#searchInput::placeholder { color: var(--text-dim); }

.sidebar-label {
  padding: 14px 16px 8px;
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  flex-shrink: 0;
}

#toc {
  list-style: none;
  overflow-y: auto;
  flex: 1;
  padding: 0 8px 16px;
}

#toc::-webkit-scrollbar { width: 4px; }
#toc::-webkit-scrollbar-track { background: transparent; }
#toc::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

#toc li a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 500;
  transition: all 0.15s ease;
  cursor: pointer;
}

#toc li a::before {
  content: '';
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
  transition: background 0.15s;
}

#toc li a:hover {
  color: var(--text);
  background: var(--surface2);
}

#toc li a:hover::before,
#toc li a.active::before {
  background: var(--accent);
}

#toc li a.active {
  color: var(--text);
  background: rgba(124,92,252,0.1);
}

.no-results-msg {
  padding: 20px 16px;
  color: var(--text-dim);
  font-size: 0.85rem;
  text-align: center;
  font-style: italic;
}

/* ─── CONTENT AREA ─── */
#content-container {
  flex: 1;
  overflow-y: auto;
  padding: 48px 56px;
}

#content-container::-webkit-scrollbar { width: 6px; }
#content-container::-webkit-scrollbar-track { background: transparent; }
#content-container::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

/* Empty state */
.empty-state {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-dim);
  text-align: center;
}

.empty-state-icon {
  font-size: 3rem;
  opacity: 0.4;
}

.empty-state p {
  font-size: 0.95rem;
  max-width: 280px;
  line-height: 1.6;
}

/* Content styles */
.content-title {
  font-family: 'Space Mono', monospace;
  font-size: 2rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 8px;
  line-height: 1.2;
}

.content-category {
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 36px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.content-category::after {
  content: '';
  flex: 1;
  max-width: 60px;
  height: 1px;
  background: var(--accent);
  opacity: 0.4;
}

.content-subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-top: 36px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.content-subtitle::before {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--accent2);
  opacity: 0.5;
}

.content-text {
  color: var(--text-muted);
  font-size: 0.95rem;
  line-height: 1.8;
  margin-bottom: 16px;
  max-width: 720px;
}

.content-blockquote {
  border-left: 3px solid var(--accent);
  padding: 14px 20px;
  background: rgba(124,92,252,0.06);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: var(--text-muted);
  font-style: italic;
  margin: 20px 0;
  max-width: 720px;
}

.content-code {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  font-family: 'Space Mono', monospace;
  font-size: 0.85rem;
  overflow-x: auto;
  margin: 12px 0;
  color: var(--accent2);
  max-width: 720px;
  line-height: 1.6;
}

ul, ol {
  padding-left: 0;
  margin: 8px 0 20px;
  max-width: 720px;
  list-style: none;
}

ul li, ol li {
  color: var(--text-muted);
  font-size: 0.925rem;
  line-height: 1.7;
  padding: 5px 0 5px 20px;
  position: relative;
}

ul li::before {
  content: '→';
  position: absolute;
  left: 0;
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  top: 7px;
}

ol { counter-reset: item; }
ol li { counter-increment: item; }
ol li::before {
  content: counter(item) ".";
  position: absolute;
  left: 0;
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  top: 7px;
  font-weight: 700;
}

/* ─── RESPONSIVE ─── */
@media (max-width: 800px) {
  body { overflow: auto; height: auto; }
  #app { flex-direction: column; overflow: visible; }
  #sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); max-height: 260px; }
  #content-container { padding: 28px 20px; overflow: visible; }
  header { padding: 0 16px; }
  .header-title { display: none; }
}
</style>
</head>

// ─── LANGUAGE SYSTEM ─────────────────────────────────────────────
let LANG = 'de';

(function () {
  const urlParam = new URLSearchParams(window.location.search).get('lang');
  const saved    = localStorage.getItem('ingw-lang');
  const lang     = (urlParam === 'en' || urlParam === 'de') ? urlParam
                 : (saved    === 'en' || saved    === 'de') ? saved
                 : 'de';
  if (urlParam) localStorage.setItem('ingw-lang', urlParam);
  LANG = lang;
  window.LANG = lang;
  document.documentElement.lang = lang;
})();

function applyLang(lang) {
  LANG = lang;
  window.LANG = lang;
  document.documentElement.lang = lang;
  localStorage.setItem('ingw-lang', lang);

  // data-de / data-en static elements
  document.querySelectorAll('[data-de], [data-en]').forEach(el => {
    const text = el.getAttribute('data-' + lang);
    if (text !== null) el.textContent = text;
  });

  // placeholders
  document.querySelectorAll('[data-placeholder-' + lang + ']').forEach(el => {
    el.placeholder = el.getAttribute('data-placeholder-' + lang);
  });

  // toggle button
  const btn = document.getElementById('lang-toggle-btn');
  if (btn) btn.textContent = lang === 'de' ? 'EN' : 'DE';

  // update links
  document.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href || href.startsWith('http') || href.startsWith('//') || href.startsWith('#')) return;
    const [path, query] = href.split('?');
    const params = new URLSearchParams(query || '');
    params.set('lang', lang);
    a.setAttribute('href', path + '?' + params.toString());
  });

  // re-render TOC and active content
  const query = document.getElementById('searchInput').value;
  renderTOC(getFiltered(query));

  if (activeItem) showContent(activeItem);
}

window.switchLang = function(newLang) { applyLang(newLang); };

// ─── APP LOGIC ───────────────────────────────────────────────────
let activeItem = null;

// Sort alphabetically by current lang title
function getSorted(data) {
  return [...data].sort((a, b) => {
    const ta = a['title_' + LANG] || a.title_de;
    const tb = b['title_' + LANG] || b.title_de;
    return ta.localeCompare(tb, LANG);
  });
}

function getFiltered(query) {
  const q = query.toLowerCase();
  if (!q) return getSorted(knowledgeData);
  return getSorted(knowledgeData.filter(item => {
    return (item['title_' + LANG] || item.title_de).toLowerCase().includes(q) ||
           (item['content_' + LANG] || item.content_de).toLowerCase().includes(q);
  }));
}

function renderTOC(data) {
  const toc = document.getElementById('toc');
  toc.innerHTML = '';
  if (data.length === 0) {
    const msg = document.createElement('li');
    msg.className = 'no-results-msg';
    msg.textContent = LANG === 'de' ? 'Keine Ergebnisse.' : 'No results.';
    toc.appendChild(msg);
    return;
  }
  data.forEach(item => {
    const li = document.createElement('li');
    const a  = document.createElement('a');
    a.href = '#';
    a.textContent = item['title_' + LANG] || item.title_de;
    if (activeItem && activeItem === item) a.classList.add('active');
    a.addEventListener('click', e => {
      e.preventDefault();
      activeItem = item;
      document.querySelectorAll('#toc a').forEach(x => x.classList.remove('active'));
      a.classList.add('active');
      showContent(item);
    });
    li.appendChild(a);
    toc.appendChild(li);
  });
}

function showContent(item) {
  const container = document.getElementById('content-container');
  const title   = item['title_' + LANG]    || item.title_de;
  const cat     = item['category_' + LANG] || item.category_de;
  const content = item['content_' + LANG]  || item.content_de;

  container.innerHTML = `
    <h1 class="content-title">${title}</h1>
    <div class="content-category">${cat}</div>
    <div>${content}</div>
  `;
  container.scrollTop = 0;
}

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  renderTOC(getFiltered(e.target.value));
});

// Init
applyLang(LANG);
</script>
