<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CO2-Rechner | Ingwerperium</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
:root{--bg:#2C1A0E;--bg2:#3D2410;--panel:#4A2E14;--bdr:#8B5E2A;--bdr2:#C4843A;--gold:#D4A843;--amber:#E8C060;--light:#F5DFA0;--cream:#F9EDD0;--grn:#5A9E3A;--grn2:#7DC44A;--red:#C03020;--red2:#E04030;--blu:#3A6A9E;--txt:#F5DFA0;--mut:#A0784A;--shd:#1A0E05}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);width:100%;overflow-x:hidden}
#app{font-family:'Press Start 2P','Courier New',monospace;background:var(--bg);color:var(--txt);min-height:100vh;font-size:10px}
.hdr{background:var(--bg2);border-bottom:4px solid var(--bdr2);padding:12px 16px;text-align:center;position:relative;min-height:58px;display:flex;flex-direction:column;justify-content:center}
.hdr h1{font-size:clamp(6px,2.2vw,12px);color:var(--amber);text-shadow:3px 3px 0 var(--shd);margin-bottom:5px;padding:0 64px}
.hdr p{font-size:clamp(4px,1.2vw,6px);color:var(--mut)}
.hub-btn{position:absolute;top:8px;left:8px;font-family:'Press Start 2P',monospace;font-size:clamp(4px,1vw,6px);padding:5px 7px;background:var(--panel);border:2px solid var(--bdr);color:var(--mut);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;line-height:1;z-index:10}
.hub-btn:hover{background:var(--gold);color:var(--bg);border-color:var(--amber)}
.hub-btn:active{transform:translate(1px,1px)}
.lang{position:absolute;top:8px;right:8px;display:flex;gap:3px}
.lbtn{font-family:'Press Start 2P',monospace;font-size:6px;padding:5px 9px;background:var(--panel);border:2px solid var(--bdr);color:var(--mut);cursor:pointer}
.lbtn.on,.lbtn:hover{background:var(--gold);color:var(--bg);border-color:var(--amber)}
.lbtn:active{transform:translate(1px,1px)}
.modes{display:flex;justify-content:center;flex-wrap:wrap;gap:4px;background:var(--bg2);border-bottom:3px solid var(--bdr2);padding:8px 16px}
.mbtn{font-family:'Press Start 2P',monospace;font-size:clamp(5px,1.8vw,7px);padding:9px 18px;background:var(--panel);border:2px solid var(--bdr);color:var(--mut);cursor:pointer;transition:all .1s}
.mbtn.on{background:var(--grn);color:var(--cream);border-color:var(--grn2);box-shadow:3px 3px 0 var(--shd)}
.mbtn:hover:not(.on){background:var(--bdr);color:var(--txt)}
.mbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--shd)}
.mode-desc{background:var(--bg2);border-bottom:2px solid var(--bdr);padding:5px 12px;font-size:clamp(4px,1.1vw,5px);color:var(--mut);text-align:center;line-height:1.7}
.tabs{display:flex;flex-wrap:wrap;gap:2px;padding:8px 8px 0;background:var(--bg2);border-bottom:4px solid var(--bdr2)}
.tbtn{font-family:'Press Start 2P',monospace;font-size:clamp(4px,1.2vw,6px);padding:6px 8px;background:var(--panel);border:2px solid var(--bdr);border-bottom:none;color:var(--mut);cursor:pointer;transition:all .1s;line-height:1.4}
.tbtn.on{background:var(--bg);color:var(--amber);border-color:var(--bdr2);position:relative;top:4px;z-index:1}
.tbtn:hover:not(.on){background:var(--bdr);color:var(--txt)}

.right{padding:12px;background:var(--bg2)}
.stitle{font-size:clamp(5px,1.5vw,8px);color:var(--gold);margin-bottom:12px;border-bottom:2px solid var(--bdr);padding-bottom:7px;text-shadow:2px 2px 0 var(--shd)}
.fg{margin-bottom:16px}
.fl{font-size:clamp(5px,1.3vw,7px);color:var(--light);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:4px}
.fl-left{display:flex;align-items:center;gap:5px;flex:1;min-width:0;flex-wrap:wrap;line-height:1.6}
.fv{font-size:clamp(6px,1.4vw,8px);color:var(--amber);background:var(--panel);padding:3px 7px;border:2px solid var(--bdr);min-width:70px;text-align:right;flex-shrink:0}
input[type=range]{-webkit-appearance:none;width:100%;height:10px;background:var(--panel);border:2px solid var(--bdr);outline:none;cursor:pointer;margin-top:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:var(--gold);border:2px solid var(--amber);cursor:pointer}
input[type=range]::-webkit-slider-thumb:hover{background:var(--amber)}
select{font-family:'Press Start 2P',monospace;font-size:clamp(4px,1.1vw,6px);width:100%;padding:8px;background:var(--panel);border:2px solid var(--bdr);color:var(--txt);outline:none;cursor:pointer;margin-top:4px}
select:focus{border-color:var(--bdr2)}

.btn-rst{background:var(--red);color:var(--cream);border-color:var(--red2)}
.btn-rst:hover{background:var(--red2)}
.btn-shr{background:var(--blu);color:var(--cream);border-color:#4A8ABE}
.btn-shr:hover{background:#4A8ABE}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.badge{display:inline-block;font-size:clamp(4px,1vw,5px);padding:4px 8px;border:1px solid;line-height:1.7;text-align:center;max-width:100%}

.avgfill{height:100%;background:var(--blu);opacity:.5;position:absolute;top:0;left:0}

.info-btn{

  color:var(--cream);font-size:7px;
  cursor:pointer;flex-shrink:0;
  font-family:'Press Start 2P',monospace;line-height:1;
  user-select:none;vertical-align:middle;
  -webkit-tap-highlight-color:transparent;

/* ── GLOBAL TOOLTIP OVERLAY ── */
#tooltip-overlay{
  display:none;
  position:fixed;
  z-index:9000;
  background:#1A0E05;
  border:2px solid var(--bdr2);
  color:var(--light);
  font-size:clamp(5px,2.5vw,6px);
  font-family:'Press Start 2P',monospace;
  padding:10px 12px;
  line-height:2;
  box-shadow:3px 3px 0 var(--shd);
  pointer-events:none;
  white-space:normal;
  word-break:break-word;
  /* constrained width — never wider than viewport minus margin */
  max-width:min(340px, calc(100vw - 24px));
  width:max-content;
}
#tooltip-overlay.visible{display:block}

/* ── CLOSE HINT (mobile only) ── */
#tooltip-close-hint{
  display:none;
  margin-top:7px;
  font-size:5px;
  color:var(--mut);
  text-align:right;
}
@media(max-width:720px){
  #tooltip-close-hint{display:block}
}
</style>

var LS_KEY = 'co2_vals_v3';
function saveToStorage() {

}
function loadFromStorage() {

/* ═══════════════════════════════════════════════
   TOOLTIP SYSTEM — viewport-aware global overlay
   ═══════════════════════════════════════════════ */
var _activeInfoBtn = null;

function showTooltip(btn, text) {
  var overlay = document.getElementById('tooltip-overlay');
  var textEl  = document.getElementById('tooltip-text');

  // Close if same button clicked again
  if (_activeInfoBtn === btn) {
    hideTooltip();
    return;
  }
  if (_activeInfoBtn) {
    _activeInfoBtn.classList.remove('active');
  }
  _activeInfoBtn = btn;
  btn.classList.add('active');

  textEl.textContent = text;
  overlay.classList.add('visible');

  // Position after making visible so we can measure its size
  requestAnimationFrame(function() {
    positionTooltip(btn, overlay);
  });
}

function positionTooltip(btn, overlay) {
  var MARGIN = 8; // px gap from viewport edges
  var btnRect = btn.getBoundingClientRect();
  var ow = overlay.offsetWidth;
  var oh = overlay.offsetHeight;
  var vw = window.innerWidth;
  var vh = window.innerHeight;

  // Preferred: right of button
  var left = btnRect.right + 6;
  var top  = btnRect.top;

  // If overflows right → try left of button
  if (left + ow > vw - MARGIN) {
    left = btnRect.left - ow - 6;
  }
  // Still overflows left → centre horizontally in viewport
  if (left < MARGIN) {
    left = MARGIN;
  }
  // Clamp right edge
  if (left + ow > vw - MARGIN) {
    left = vw - ow - MARGIN;
    if (left < MARGIN) left = MARGIN;
  }

  // Preferred: align top with button top
  // If overflows bottom → shift up
  if (top + oh > vh - MARGIN) {
    top = vh - oh - MARGIN;
  }
  // Don't go above viewport
  if (top < MARGIN) top = MARGIN;

  overlay.style.left = Math.round(left) + 'px';
  overlay.style.top  = Math.round(top)  + 'px';
  // Hard-clamp width inside viewport
  overlay.style.maxWidth = (vw - 2*MARGIN) + 'px';
}

function hideTooltip() {
  var overlay = document.getElementById('tooltip-overlay');
  overlay.classList.remove('visible');
  if (_activeInfoBtn) {
    _activeInfoBtn.classList.remove('active');
    _activeInfoBtn = null;
  }
}

// Close on outside click / tap
document.addEventListener('click', function(e) {
  if (_activeInfoBtn && !_activeInfoBtn.contains(e.target)) {
    hideTooltip();
  }
});

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') hideTooltip();
});

// Reposition on resize / scroll
window.addEventListener('resize', function() {
  if (_activeInfoBtn) {
    positionTooltip(_activeInfoBtn, document.getElementById('tooltip-overlay'));
  }
});
document.addEventListener('scroll', function() {
  if (_activeInfoBtn) {
    positionTooltip(_activeInfoBtn, document.getElementById('tooltip-overlay'));
  }
}, true);

function infoBtn(key) {
  var tip = TOOLTIPS[key];
  if (!tip) return '';
  var txt = (tip[lang] || tip['de'])
    .replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'")
    .replace(/"/g,'&quot;');
  return '<button class="info-btn" tabindex="0" aria-label="Info" onclick="event.stopPropagation();showTooltip(this,\'' + txt + '\')">?</button>';
}

     {k:'bpaper',lbl_de:'Papierverbrauch (Ries/Jahr)',lbl_en:'Paper usage (reams/year)',min:0,max:500,step:5,def:0}],
    [{k:'staff',lbl_de:'Mitarbeiter (Anzahl)',lbl_en:'Employees (headcount)',min:1,max:500,step:1,def:1},
     {k:'homeoffice',lbl_de:'Homeoffice-Tage/Woche (Ø)',lbl_en:'Home-office days/week (avg)',min:0,max:5,step:0.5,def:0},
     {k:'commute',lbl_de:'Pendelweg einfach (km, Ø)',lbl_en:'Commute one-way (km, avg)',min:0,max:100,step:1,def:0},
     {k:'commutetype',lbl_de:'Pendel-Verkehrsmittel',lbl_en:'Commute mode',type:'sel',opts:[['car','Auto (0.21 kg/km)','Car (0.21 kg/km)'],['transit','ÖPNV: Bus/U-Bahn (0.089 kg/km)','Public transit (0.089 kg/km)'],['bike','Fahrrad/Fuß (0 kg/km)','Bike/Walk (0 kg/km)']],def:'car'}]
  ]
};

var vals = {};
var activeTab = 0;

function defaults() {
  vals = {};
  SCHEMAS[mode].forEach(function(tab){ tab.forEach(function(f){ vals[f.k] = f.def; }); });
}

function calcP() {
  var rf = 1 - (vals.renew/100)*0.7;
  var energy = (vals.elec*0.4*rf) + (vals.oil*2.68) + (vals.gas*2.0) + (vals.heat*0.2);
  var cfMap = {petrol:0.21,diesel:0.17,hybrid:0.12,electric:0.06,none:0};
  var cf = (cfMap[vals.cartype] !== undefined) ? cfMap[vals.cartype] : 0.21;
  var suvExtra = 0;
  if (vals.cartype === 'suv') { cf = 0.25; suvExtra = 8000/15; }
  var mobility = (vals.car*cf) + suvExtra + (vals.sf*180) + (vals.lf*2500) + (vals.transit*0.089) + (vals.train*0.032) + (vals.scooter*0.03);
  var dietBase = {heavy:3500,meat:2500,low:1700,veg:1200,vegan:900,none:0}[vals.diet]||0;
  var food = Math.max(0, dietBase + (vals.beef*52*27*0.3) + (vals.othermeat*52*6) - (vals.local/100*300) + (vals.fwaste/100*200));
  var waste = Math.max(0, (vals.waste*0.5) + (vals.water*0.34) - (vals.recycle/100*100) - (vals.compost==='full'?50:vals.compost==='partial'?25:0));
  var lifestyle = (vals.clothes*3.0) + (vals.electronics*0.3) + (vals.stream*0.036*365) + (vals.holidays*300);
  return {energy:Math.round(energy),mobility:Math.round(mobility),food:Math.round(food),waste:Math.round(waste),lifestyle:Math.round(lifestyle)};
}

function calcB() {
  var rf = 1 - (vals.brenew/100)*0.7;
  var energy = (vals.belec*0.4*rf) + (vals.bgas*2.0) + (vals.sqm*15);
  var cf = {petrol:0.21,diesel:0.17,hybrid:0.12,electric:0.06}[vals.bcartype]||0.17;
  var travel = (vals.bsf*250) + (vals.blf*3500) + (vals.bcar*cf) + (vals.btrain*0.032) + (vals.bscooter*0.03);
  var it = (vals.pcs*40) + (vals.servers*2000) + (vals.cloud*12*0.5) + (vals.screens*30);
  var waste = Math.max(0, (vals.bwaste*0.5) - (vals.brecycle/100*200) + (vals.bpaper*4.5));
  var workdays = 220;
  var commuteEF = {car:0.21,transit:0.089,bike:0}[vals.commutetype]||0.21;
  var activeDays = workdays * (1 - vals.homeoffice/5);
  var staff = vals.staff * (vals.commute*2*commuteEF*activeDays);
  return {energy:Math.round(energy),travel:Math.round(travel),it:Math.round(it),waste:Math.round(waste),staff:Math.round(staff)};
}

function getCategories(){ return mode==='p' ? calcP() : calcB(); }

function getCatLabels(){
  return mode==='p'
    ? (lang==='de'?['Energie','Mobilität','Ernährung','Abfall','Lifestyle']:['Energy','Mobility','Food','Waste','Lifestyle'])
    : (lang==='de'?['Büroenergie','Geschäftsreisen','IT & Geräte','Abfall','Mitarbeiter']:['Office Energy','Business Travel','IT & Devices','Waste','Staff']);
}

function getCatTips(){
  var T = TR[lang];
  return mode==='p' ? Object.values(T.tips_p) : Object.values(T.tips_b);
}

function buildTabs(){
  var bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  var tabs = TR[lang][mode==='p'?'tabs_p':'tabs_b'];
  tabs.forEach(function(lbl,i){
    var b = document.createElement('button');
    b.className = 'tbtn'+(i===activeTab?' on':'');
    b.textContent = lbl;
    b.onclick = (function(idx){ return function(){ activeTab=idx; buildTabs(); buildInputs(); }; })(i);
    bar.appendChild(b);
  });
}

function buildInputs(){
  var panel = document.getElementById('leftpanel');
  var schema = SCHEMAS[mode][activeTab];
  var T = TR[lang];
  var tabTips = T[mode==='p'?'tip_p':'tip_b'];
  var tabLabels = T[mode==='p'?'tabs_p':'tabs_b'];
  var html = '<div class="stitle">'+tabLabels[activeTab]+'</div>';
  schema.forEach(function(f){
    var lbl = lang==='de' ? f.lbl_de : f.lbl_en;
    var ib = infoBtn(f.k);
    if (f.type === 'sel') {
      html += '<div class="fg"><div class="fl"><div class="fl-left">'+lbl+' '+ib+'</div></div><select onchange="setVal(\''+f.k+'\',this.value)">';
      f.opts.forEach(function(o){
        var sel = vals[f.k]===o[0] ? 'selected' : '';
        html += '<option value="'+o[0]+'" '+sel+'>'+(lang==='de'?o[1]:o[2])+'</option>';
      });
      html += '</select></div>';
    } else {
      var v = vals[f.k];
      var pct = (f.max===f.min) ? 0 : Math.min(100, ((v-f.min)/(f.max-f.min))*100);
      var cls = pct>75?' hi':pct>40?' med':'';
      var disp = Number.isInteger(f.step) ? Math.round(v).toLocaleString() : parseFloat(v).toFixed(1);
      html += '<div class="fg"><div class="fl"><div class="fl-left"><span>'+lbl+'</span> '+ib+'</div>'
        +'<span class="fv" id="fv-'+f.k+'">'+disp+'</span></div>'
        +'<input type="range" min="'+f.min+'" max="'+f.max+'" step="'+f.step+'" value="'+v+'" oninput="setVal(\''+f.k+'\',this.value)">'
        +'<div class="mbar"><div class="mfill'+cls+'" id="mb-'+f.k+'" style="width:'+pct+'%"></div></div></div>';
    }
  });
  html += '<div class="tip"><div class="tipt">'+(lang==='de'?' TIPP':' TIP')+'</div>'+(tabTips[activeTab]||'')+'</div>';
  panel.innerHTML = html;
}

function setVal(k, v){
  vals[k] = isNaN(v) ? v : parseFloat(v);
  var fv = document.getElementById('fv-'+k);
  if (fv) {
    var f = null;
    SCHEMAS[mode].forEach(function(tab){ tab.forEach(function(x){ if(x.k===k) f=x; }); });
    if (f) fv.textContent = Number.isInteger(f.step) ? Math.round(vals[k]).toLocaleString() : parseFloat(vals[k]).toFixed(1);
  }
  var mb = document.getElementById('mb-'+k);
  if (mb) {
    var f2 = null;
    SCHEMAS[mode].forEach(function(tab){ tab.forEach(function(x){ if(x.k===k) f2=x; }); });
    if (f2 && f2.max !== f2.min) {
      var pct = Math.min(100, ((parseFloat(v)-f2.min)/(f2.max-f2.min))*100);
      mb.style.width = pct+'%';
      mb.className = 'mfill'+(pct>75?' hi':pct>40?' med':'');
    }
  }
  saveToStorage();
  updateResults();
}

function updateResults(){
  var T = TR[lang];
  var cats = getCategories();
  var total = Object.values(cats).reduce(function(a,b){return a+b;},0);
  document.getElementById('disp-total').textContent = Math.round(total).toLocaleString()+' kg';
  document.getElementById('disp-t').textContent = (total/1000).toFixed(2)+' t CO2e/'+(lang==='de'?'Jahr':'year');

  var rlist = mode==='p' ? T.rating : T.rating_b;
  var ri, rc;
  if (mode==='p'){
    if(total<2000){ri=0;rc='bgood';}else if(total<4800){ri=1;rc='bgood';}else if(total<8200){ri=2;rc='bok';}else if(total<11600){ri=3;rc='bok';}else{ri=4;rc='bbad';}
  } else {
    if(total<10000){ri=0;rc='bgood';}else if(total<50000){ri=1;rc='bgood';}else if(total<80000){ri=2;rc='bok';}else if(total<120000){ri=3;rc='bok';}else{ri=4;rc='bbad';}
  }
  document.getElementById('disp-badge').innerHTML = '<span class="badge '+rc+'">'+rlist[ri]+'</span>';

  var labels = getCatLabels();
  var data = Object.values(cats);
  var colors = ['#C4843A','#5A9E3A','#D4A843','#3A6A9E','#8B5E2A'];
  if (myChart) {
    myChart.data.labels = labels;
    myChart.data.datasets[0].data = data;
    myChart.update();
  } else {
    var ctx = document.getElementById('chart').getContext('2d');
    myChart = new Chart(ctx, {
      type:'bar',
      data:{labels:labels,datasets:[{label:'kg CO2e',data:data,backgroundColor:colors,borderColor:colors.map(function(c){return c+'CC';}),borderWidth:2}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return Math.round(c.raw).toLocaleString()+' kg CO2e';}}}},
        scales:{
          x:{ticks:{color:'#A0784A',font:{family:'Courier New',size:8}},grid:{color:'rgba(139,94,42,0.25)'}},
          y:{min:0,ticks:{color:'#A0784A',font:{family:'Courier New',size:8},callback:function(v){return v>=1000?(v/1000).toFixed(0)+'k':v;}},grid:{color:'rgba(139,94,42,0.25)'}}
        }
      }
    });
  }

  var cmax = mode==='p' ? T.cmpmax_p : T.cmpmax_b;
  var cmpRef = mode==='p' ? T.cmpref_p : T.cmpref_b;
  document.getElementById('cmpmax').textContent = cmax.toLocaleString()+' kg';
  var userPct = Math.min(100, Math.max(0, (total/cmax)*100));
  var avgPct  = Math.min(100, Math.max(0, (cmpRef/cmax)*100));
  document.getElementById('userfill').style.width = userPct+'%';
  document.getElementById('avgfill').style.width  = avgPct+'%';
  document.getElementById('avgmark').style.left   = avgPct+'%';
  document.getElementById('leg-you-lbl').textContent = T.leg_you;
  document.getElementById('leg-avg-lbl').textContent = T.leg_avg;

  var cmpRows = mode==='p' ? T.cmp_p : T.cmp_b;
  var rowsHtml = '';
  cmpRows.forEach(function(row, i){
    var v = i===0 ? Math.round(total).toLocaleString()+' kg' : row[1];
    rowsHtml += '<div class="crow"><span>'+row[0]+'</span><span class="cval"'+(i===0?' style="color:var(--amber)"':'')+'>'+v+'</span></div>';
  });
  if (mode==='p') {
    var diff = Math.round(total)-11600;
    var sign = diff>0?'+':'';
    rowsHtml += '<div class="crow"><span>'+(lang==='de'?'Differenz zum Ø':'Diff. to avg')+'</span><span class="cval" style="color:'+(diff>0?'#FF6040':'#7DC44A')+'">'+sign+diff.toLocaleString()+' kg</span></div>';
  } else {
    var perFTE = vals.staff>0 ? Math.round(total/vals.staff) : 0;
    rowsHtml += '<div class="crow"><span>'+(lang==='de'?'Pro Mitarbeiter':'Per employee')+'</span><span class="cval">'+perFTE.toLocaleString()+' kg</span></div>';
  }
  document.getElementById('cmprows').innerHTML = rowsHtml;

  var eqDefs = T.eq;
  var eqHtml = '';
  eqDefs.forEach(function(e){
    var num = Math.round(total/e.div);
    eqHtml += '<div class="eqrow"><span class="eico">'+e.ico+'</span><span class="eqtxt"><span class="eqnum">'+num.toLocaleString()+'</span><span class="eqdesc">'+e.lbl+'</span></span></div>';
  });
  document.getElementById('eqbox').innerHTML = eqHtml;

  var catArr = Object.entries(cats).sort(function(a,b){return b[1]-a[1];});
  var tips = getCatTips();
  var catKeys = Object.keys(cats);
  document.getElementById('tipsbox').innerHTML = catArr.slice(0,3).map(function(c,i){
    var idx = catKeys.indexOf(c[0]);
    return (i+1)+'. '+(tips[idx]||'');
  }).join('<br>');
}

function setLang(l){
  lang = l;
  try { localStorage.setItem('ingw-lang', l); } catch(e){}
  document.querySelectorAll('.lbtn').forEach(function(b){b.classList.remove('on');});
  var btn = document.querySelector('.lbtn[onclick="setLang(\''+l+'\')"]');
  if(btn) btn.classList.add('on');
  hideTooltip();
  applyStaticTranslations();
  buildTabs(); buildInputs(); updateResults();
  saveToStorage();
}

function setMode(m){
  mode = m;
  activeTab = 0;
  document.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on');});
  document.getElementById('mbtn-'+m).classList.add('on');
  if(myChart){myChart.destroy();myChart=null;}
  hideTooltip();
  defaults();
  applyStaticTranslations();
  buildTabs(); buildInputs(); updateResults();
  saveToStorage();
}

function applyStaticTranslations(){
  var T = TR[lang];
  document.getElementById('htitle').textContent = T.htitle;
  document.getElementById('hsub').textContent   = T.hsub;
  document.getElementById('mlbl-p').textContent = T.mlbl_p;
  document.getElementById('mlbl-b').textContent = T.mlbl_b;
  document.getElementById('mdesc').textContent  = T[mode==='p'?'mdesc_p':'mdesc_b'];
  document.getElementById('rtitle').textContent = T.rtitle;
  document.getElementById('lbl-total').textContent     = T.lbl_total;
  document.getElementById('lbl-breakdown').textContent = T.lbl_breakdown;
  document.getElementById('lbl-cmp').textContent       = T.lbl_cmp;
  document.getElementById('lbl-eq').textContent        = T.lbl_eq;
  document.getElementById('lbl-tips').textContent      = T.lbl_tips;
  document.getElementById('lbl-rst').textContent       = T.lbl_rst;
  document.getElementById('lbl-shr').textContent       = T.lbl_shr;
}

function doReset(){
  if(myChart){myChart.destroy();myChart=null;}
  hideTooltip();
  defaults();
  buildTabs(); buildInputs(); updateResults();
  saveToStorage();
  var b = document.getElementById('btn-rst');
  b.style.transform='translate(3px,3px)'; b.style.boxShadow='1px 1px 0 var(--shd)';
  setTimeout(function(){b.style.transform='';b.style.boxShadow='';},150);
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

function doShare(){
  var cats = getCategories();
  var total = Object.values(cats).reduce(function(a,b){return a+b;},0);
  var t = total/1000;
  var ref = mode==='p' ? 11600 : 50000;
  var refLabel = mode==='p' ? (lang==='de'?'Dt. Haushalt':'German avg') : (lang==='de'?'KMU-Durchschnitt':'SME avg');
  var txt = lang==='de'
    ? 'Mein CO2-Fussabdruck: '+Math.round(total).toLocaleString()+' kg/Jahr ('+t.toFixed(1)+' t). '+refLabel+': '+ref.toLocaleString()+' kg. Link: https://ingwerknolle03-cell.github.io/ingwerperium/CO2.html'
    : 'My CO2 footprint: '+Math.round(total).toLocaleString()+' kg/year ('+t.toFixed(1)+' t). '+refLabel+': '+ref.toLocaleString()+' kg. Link: https://ingwerknolle03-cell.github.io/ingwerperium/CO2.html';
  try {
    navigator.clipboard.writeText(txt).then(function(){showToast(TR[lang].copied);}).catch(function(){fallbackCopy(txt);});
  } catch(e){ fallbackCopy(txt); }
  var b = document.getElementById('btn-shr');
  b.style.transform='translate(3px,3px)'; b.style.boxShadow='1px 1px 0 var(--shd)';
  setTimeout(function(){b.style.transform='';b.style.boxShadow='';},150);
}

function fallbackCopy(txt){
  var ta = document.createElement('textarea');
  ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); showToast(TR[lang].copied); }catch(e){ showToast('Error'); }
  document.body.removeChild(ta);
}

// Init
var loaded = loadFromStorage();
if(!loaded) defaults();
(function(){
  var urlLang = new URLSearchParams(window.location.search).get('lang');
  var hubLang = null;
  try { hubLang = localStorage.getItem('ingw-lang'); } catch(e){}
  var preferred = urlLang || hubLang;
  if(preferred === 'en' || preferred === 'de') { lang = preferred; }
})();
document.querySelectorAll('.mbtn').forEach(function(b){b.classList.remove('on');});
document.getElementById('mbtn-'+mode).classList.add('on');
document.querySelectorAll('.lbtn').forEach(function(b){b.classList.remove('on');});
var activeLBtn = document.querySelector('.lbtn[onclick="setLang(\''+lang+'\')"]');
if(activeLBtn) activeLBtn.classList.add('on');
applyStaticTranslations();
buildTabs();
buildInputs();
updateResults();
</script>
</body>
</html>
