<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filme – Ingwerperium Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f;--surface:#111118;--surface2:#17171f;--surface3:#1e1e2a;
  --border:rgba(255,255,255,0.07);--accent:#7c5cfc;--accent2:#00d4ff;
  --red:#ff4444;--green:#00c850;--text:#e8e8f0;--text-muted:#888898;--text-dim:#555566;
  --glow:rgba(124,92,252,0.3);--radius:16px;--radius-sm:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(124,92,252,0.07) 0%,transparent 55%),radial-gradient(ellipse 60% 40% at 80% 90%,rgba(255,68,68,0.05) 0%,transparent 55%);pointer-events:none;z-index:0;}
#galaxy-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

header{position:sticky;top:0;z-index:100;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-logo{font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;color:var(--text-muted);letter-spacing:0.05em;text-decoration:none;display:flex;align-items:center;gap:8px;transition:color 0.2s;}
.header-logo:hover{color:var(--text);}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.header-title{font-family:'Space Mono',monospace;font-size:0.95rem;font-weight:700;color:var(--text);padding-left:20px;border-left:1px solid var(--border);}
.header-nav{display:flex;align-items:center;gap:8px;}
.lang-btn{padding:6px 12px;border:1px solid var(--accent);border-radius:8px;background:rgba(124,92,252,0.12);color:var(--accent);font-family:'Space Mono',monospace;font-size:0.75rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.lang-btn:hover{background:rgba(124,92,252,0.25);box-shadow:0 0 14px var(--glow);}

main{position:relative;z-index:1;flex:1;padding:52px 40px 80px;max-width:1280px;margin:0 auto;width:100%;}

.page-hero{margin-bottom:48px;}
.page-label{font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--red);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.page-label::before{content:'';width:20px;height:1px;background:var(--red);}
.page-hero h1{font-family:'Space Mono',monospace;font-size:2.2rem;font-weight:700;color:var(--text);letter-spacing:-0.02em;margin-bottom:12px;line-height:1.2;}
.page-hero p{color:var(--text-muted);font-size:0.95rem;line-height:1.7;max-width:560px;}

.search-section{margin-bottom:36px;}
.search-wrap{position:relative;margin-bottom:16px;}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:1rem;pointer-events:none;}
#searchInput{width:100%;padding:14px 16px 14px 44px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.1);}
#searchInput::placeholder{color:var(--text-dim);}
.filters{display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.2s;}
.filter-btn:hover{border-color:var(--accent);color:var(--text);}
.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,92,252,0.12);}

.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
.results-info{font-family:'Space Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:10px;}
.results-info::after{content:'';flex:1;height:1px;background:var(--border);min-width:30px;}
.toolbar-right{display:flex;gap:8px;}
.tool-btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-muted);font-family:'Space Mono',monospace;font-size:0.7rem;cursor:pointer;transition:all 0.2s;letter-spacing:0.05em;}
.tool-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(124,92,252,0.08);}

.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}

.video-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform 0.25s ease,border-color 0.25s,box-shadow 0.25s;cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;}
.video-card:hover{transform:translateY(-5px);border-color:rgba(255,68,68,0.3);box-shadow:0 12px 40px rgba(255,68,68,0.08);}
.video-card.odysee-card:hover{border-color:rgba(0,200,80,0.3);box-shadow:0 12px 40px rgba(0,200,80,0.08);}
.video-card.ext-card:hover{border-color:rgba(0,200,80,0.3);box-shadow:0 12px 40px rgba(0,200,80,0.08);}

.video-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--surface2);flex-shrink:0;}
.video-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s ease;}
.video-card:hover .video-thumb img{transform:scale(1.05);}
.thumb-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.25s;}
.video-card:hover .thumb-overlay{opacity:1;}
.play-icon{width:52px;height:52px;border-radius:50%;background:rgba(255,68,68,0.9);display:flex;align-items:center;justify-content:center;font-size:1.2rem;padding-left:4px;box-shadow:0 0 30px rgba(255,68,68,0.5);}
.odysee-card .play-icon,.ext-card .play-icon{background:rgba(0,200,80,0.9);box-shadow:0 0 30px rgba(0,200,80,0.5);}
.video-duration{position:absolute;bottom:8px;right:8px;padding:3px 8px;border-radius:5px;background:rgba(0,0,0,0.8);font-family:'Space Mono',monospace;font-size:0.7rem;color:#fff;}
.platform-badge-thumb{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:5px;font-family:'Space Mono',monospace;font-size:0.65rem;font-weight:700;}
.yt-badge-thumb{background:rgba(255,0,0,0.85);color:#fff;}
.od-badge-thumb{background:rgba(0,180,80,0.85);color:#fff;}

.video-info{padding:16px;flex:1;display:flex;flex-direction:column;}
.video-category{font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
.video-title{font-weight:600;font-size:0.93rem;color:var(--text);line-height:1.4;margin-bottom:8px;flex:1;}
.video-desc{font-size:0.78rem;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;}
.video-meta{display:flex;align-items:center;gap:8px;}
.platform-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;font-size:0.65rem;font-family:'Space Mono',monospace;}
.yt-pill{background:rgba(255,68,68,0.1);border:1px solid rgba(255,68,68,0.2);color:var(--red);}
.od-pill{background:rgba(0,200,80,0.1);border:1px solid rgba(0,200,80,0.2);color:var(--green);}

.empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--text-dim);}
.empty-icon{font-size:3rem;margin-bottom:16px;display:block;opacity:0.4;}

.pagination{display:flex;justify-content:center;gap:8px;margin-top:32px;flex-wrap:wrap;}
.page-btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-muted);font-family:'Space Mono',monospace;font-size:0.75rem;cursor:pointer;transition:all 0.2s;}
.page-btn:hover,.page-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(124,92,252,0.1);}
.page-btn.active{font-weight:700;}

#videoModal{display:none;position:fixed;inset:0;z-index:500;background:rgba(5,5,10,0.92);backdrop-filter:blur(16px);align-items:center;justify-content:center;padding:20px;}
#videoModal.open{display:flex;}
.modal-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:860px;box-shadow:0 0 100px rgba(0,0,0,0.8);overflow:hidden;animation:modalIn 0.3s cubic-bezier(0.34,1.4,0.64,1);}
@keyframes modalIn{from{transform:scale(0.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-video{position:relative;aspect-ratio:16/9;background:#000;}
.modal-video iframe{width:100%;height:100%;border:none;}
.modal-info{padding:22px 26px;}
.modal-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:8px;}
.modal-title{font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--text);line-height:1.4;}
.modal-close{width:34px;height:34px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text-muted);font-size:1rem;cursor:pointer;transition:all 0.2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{border-color:var(--red);color:var(--red);}
.modal-desc{color:var(--text-muted);font-size:0.85rem;line-height:1.6;margin-bottom:14px;}
.modal-footer{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.open-yt{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:8px;background:var(--red);border:none;color:#fff;font-family:'Space Mono',monospace;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.open-yt:hover{background:#cc0000;transform:translateY(-1px);}
.open-od{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:8px;background:var(--green);border:none;color:#000;font-family:'Space Mono',monospace;font-size:0.78rem;font-weight:700;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.open-od:hover{background:#00a040;transform:translateY(-1px);}

footer{border-top:1px solid var(--border);padding:24px 40px;display:flex;justify-content:space-between;align-items:center;max-width:1280px;margin:0 auto;width:100%;position:relative;z-index:1;}
.footer-copy{font-size:0.78rem;color:var(--text-dim);font-family:'Space Mono',monospace;}

@media(max-width:900px){main{padding:36px 20px 60px;}header{padding:0 16px;}.header-title{display:none;}footer{padding:20px;}}
@media(max-width:600px){.video-grid{grid-template-columns:1fr;}}
</style>
</head>

<script>
/* ══ GALAXY ══ */
(function(){
  const c=document.getElementById('galaxy-canvas'),ctx=c.getContext('2d');
  let W,H,stars=[],neb=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
  function mkStar(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.2,a:Math.random(),sp:Math.random()*0.003+0.001,ph:Math.random()*Math.PI*2,col:Math.random()<0.12?(Math.random()<0.5?'124,92,252':'0,212,255'):'255,255,255'};}
  function mkNeb(){return{x:Math.random()*W,y:Math.random()*H,r:Math.random()*180+80,a:Math.random()*0.035+0.008,col:Math.random()<0.5?'124,92,252':'255,68,68',d:(Math.random()-.5)*0.04,ph:Math.random()*Math.PI*2};}
  function init(){resize();stars=Array.from({length:260},mkStar);neb=Array.from({length:5},mkNeb);}
  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);t+=0.008;
    neb.forEach(n=>{const a=n.a*(0.7+0.3*Math.sin(t*0.4+n.ph));const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);g.addColorStop(0,`rgba(${n.col},${a})`);g.addColorStop(1,`rgba(${n.col},0)`);ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();n.x+=n.d;if(n.x<-n.r)n.x=W+n.r;if(n.x>W+n.r)n.x=-n.r;});
    stars.forEach(s=>{const a=s.a*(0.4+0.6*(0.5+0.5*Math.sin(t*s.sp*300+s.ph)));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(${s.col},${a})`;ctx.fill();if(s.r>1&&a>0.65){ctx.beginPath();ctx.moveTo(s.x-s.r*2.5,s.y);ctx.lineTo(s.x+s.r*2.5,s.y);ctx.moveTo(s.x,s.y-s.r*2.5);ctx.lineTo(s.x,s.y+s.r*2.5);ctx.strokeStyle=`rgba(255,255,255,${a*0.2})`;ctx.lineWidth=0.5;ctx.stroke();}});
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{resize();neb=Array.from({length:5},mkNeb);});
  init();draw();
})();

/* ══ LANG ══ */
let LANG='de';
(function(){
  const u=new URLSearchParams(window.location.search).get('lang');
  const s=localStorage.getItem('ingw-lang');
  const l=(u==='en'||u==='de')?u:(s==='en'||s==='de')?s:'de';
  if(u)localStorage.setItem('ingw-lang',u);
  LANG=l;window.LANG=l;document.documentElement.lang=l;
})();

const T={
  de:{lib:'Mediathek',h1:'Filme & Videos',sub:'Entdecke spannende Videos von YouTube und Odysee. Suche und filtere nach Themen.',videos:'Videos',privacy:'Datenschutz',hdr:'Filme & Videos',shuffle:'🔀 Mischen',search:'Videos suchen …',openYT:'↗ Auf YouTube öffnen',openOD:'↗ Auf Odysee öffnen'},
  en:{lib:'Media Library',h1:'Films & Videos',sub:'Discover videos from YouTube and Odysee. Search and filter by topic.',videos:'Videos',privacy:'Privacy',hdr:'Films & Videos',shuffle:'🔀 Shuffle',search:'Search videos …',openYT:'↗ Open on YouTube',openOD:'↗ Open on Odysee'}
};

function applyLang(lang){
  LANG=lang;window.LANG=lang;document.documentElement.lang=lang;
  localStorage.setItem('ingw-lang',lang);
  const t=T[lang]||T.de;
  document.getElementById('lbl-lib').textContent=t.lib;
  document.getElementById('lbl-h1').textContent=t.h1;
  document.getElementById('lbl-sub').textContent=t.sub;
  document.getElementById('lbl-videos').textContent=t.videos;
  document.getElementById('lbl-privacy').textContent=t.privacy;
  document.getElementById('hdr-title').textContent=t.hdr;
  document.getElementById('btn-shuffle').textContent=t.shuffle;
  document.getElementById('searchInput').placeholder=t.search;
  document.getElementById('lang-toggle-btn').textContent=lang==='de'?'EN':'DE';
  document.querySelectorAll('a[href]').forEach(a=>{
    const h=a.getAttribute('href');
    if(!h||h.startsWith('http')||h.startsWith('//')||h.startsWith('#'))return;
    try{const[p,q]=h.split('?');const ps=new URLSearchParams(q||'');ps.set('lang',lang);a.setAttribute('href',p+'?'+ps.toString());}catch(e){}
  });
  renderFilters();renderPage();
}
window.switchLang=function(l){applyLang(l);};

/* ══ CATEGORIES ══ */
const CATS={
  all:        {de:'Alle',         en:'All'},
  ingwerperium:{de:'Ingwerperium', en:'Ingwerperium'},
  universum:  {de:'Universum',    en:'Universe'},
  natur:      {de:'Natur',        en:'Nature'},
  physik:     {de:'Physik',       en:'Physics'},
  technologie:{de:'Technologie',  en:'Technology'},
  zukunft:    {de:'Zukunft',      en:'Future'},
  mathematik: {de:'Mathematik',   en:'Mathematics'},
  geschichte: {de:'Geschichte',   en:'History'},
  psychologie:{de:'Psychologie',  en:'Psychology'},
  geografie:  {de:'Geografie',    en:'Geography'},
};

let activeFilter='all';
let currentVideos=[...VIDEOS];
let currentPage=0;
const PER_PAGE=24;

/* ══ SHUFFLE ══ */
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function shuffleAndRender(){currentVideos=shuffle(filtered());currentPage=0;renderPage();}

/* ══ URL helpers ══ */
function getThumb(v){
  if(v.thumb) return v.thumb;
  if(v.platform==='yt') return `https://img.youtube.com/vi/${v.id}/mqdefault.jpg`;
  // Odysee: generic placeholder
  return `https://img.youtube.com/vi/3xHNcOsSNhA/mqdefault.jpg`;
}
function getEmbed(v){
  if(v.platform==='yt')  return `https://www.youtube-nocookie.com/embed/${v.id}?autoplay=1&rel=0`;
  if(v.platform==='od')  return `https://odysee.com/$/embed/${v.id}?autoplay=1`;
  return ''; // ext: no embed
}
function getExtURL(v){
  if(v.platform==='yt')  return `https://www.youtube.com/watch?v=${v.id}`;
  if(v.platform==='od')  return `https://odysee.com/${v.id}`;
  return v.id; // ext: id IS the URL
}

/* ══ FILTER ══ */
function filtered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  return VIDEOS.filter(v=>{
    const matchCat=activeFilter==='all'||v.category===activeFilter;
    const title=(v['title_'+LANG]||v.title_de).toLowerCase();
    const desc=(v['desc_'+LANG]||v.desc_de).toLowerCase();
    const matchQ=!q||title.includes(q)||desc.includes(q)||v.category.includes(q);
    return matchCat&&matchQ;
  });
}
function doSearch(){currentVideos=filtered();currentPage=0;renderPage();}

/* ══ RENDER FILTERS ══ */
function renderFilters(){
  const row=document.getElementById('filterRow');
  row.innerHTML='';
  Object.entries(CATS).forEach(([key,lbl])=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(activeFilter===key?' active':'');
    btn.textContent=lbl[LANG]||lbl.de;
    btn.onclick=()=>{activeFilter=key;currentVideos=filtered();currentPage=0;renderPage();renderFilters();};
    row.appendChild(btn);
  });
}

/* ══ RENDER PAGE ══ */
function renderPage(){
  const grid=document.getElementById('videoGrid');
  const pag=document.getElementById('pagination');
  const total=currentVideos.length;
  document.getElementById('resultsCount').textContent=total;

  if(total===0){
    grid.innerHTML=`<div class="empty-state"><span class="empty-icon">🎬</span><p>${LANG==='de'?'Keine Videos gefunden.':'No videos found.'}</p></div>`;
    pag.innerHTML='';return;
  }

  const totalPages=Math.ceil(total/PER_PAGE);
  if(currentPage>=totalPages)currentPage=0;
  const slice=currentVideos.slice(currentPage*PER_PAGE,(currentPage+1)*PER_PAGE);

  grid.innerHTML='';
  slice.forEach(v=>{
    const title=v['title_'+LANG]||v.title_de;
    const desc=v['desc_'+LANG]||v.desc_de;
    const catLabel=(CATS[v.category]||{de:v.category,en:v.category})[LANG];
    const isOd=v.platform==='od';
    const isExt=v.platform==='ext';
    const isOdLike=isOd||isExt;

    const card=document.createElement('div');
    card.className='video-card'+(isOdLike?' odysee-card':'');
    card.innerHTML=`
      <div class="video-thumb">
        <img src="${getThumb(v)}" alt="${title}" loading="lazy"
             onerror="this.src='https://via.placeholder.com/480x270/111118/555566?text=Video'">
        <div class="thumb-overlay"><div class="play-icon">▶</div></div>
        ${v.duration?`<div class="video-duration">${v.duration}</div>`:''}
        <div class="platform-badge-thumb ${isOdLike?'od-badge-thumb':'yt-badge-thumb'}">${isOdLike?'Odysee':'YouTube'}</div>
      </div>
      <div class="video-info">
        <div class="video-category">${catLabel||v.category}</div>
        <div class="video-title">${title}</div>
        <div class="video-desc">${desc}</div>
        <div class="video-meta">
          <span class="platform-pill ${isOdLike?'od-pill':'yt-pill'}">${isOdLike?'🟢 Odysee':'▶ YouTube'}</span>
        </div>
      </div>`;

    if(isExt){
      // External-only: open directly in new tab, no modal
      card.style.cursor='pointer';
      card.addEventListener('click',()=>window.open(getExtURL(v),'_blank'));
    } else {
      card.addEventListener('click',()=>openModal(v));
    }
    grid.appendChild(card);
  });

  // Pagination
  pag.innerHTML='';
  if(totalPages>1){
    for(let i=0;i<totalPages;i++){
      const btn=document.createElement('button');
      btn.className='page-btn'+(i===currentPage?' active':'');
      btn.textContent=i+1;
      btn.onclick=()=>{currentPage=i;renderPage();window.scrollTo({top:0,behavior:'smooth'});};
      pag.appendChild(btn);
    }
  }
}

/* ══ MODAL ══ */
function openModal(v){
  const isOdLike=v.platform==='od'||v.platform==='ext';
  const title=v['title_'+LANG]||v.title_de;
  const desc=v['desc_'+LANG]||v.desc_de;
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalDesc').textContent=desc;
  document.getElementById('modalIframe').src=getEmbed(v);
  const link=document.getElementById('modalExtLink');
  link.href=getExtURL(v);
  link.textContent=LANG==='de'
    ?(isOdLike?'↗ Auf Odysee öffnen':'↗ Auf YouTube öffnen')
    :(isOdLike?'↗ Open on Odysee':'↗ Open on YouTube');
  link.className=isOdLike?'open-od':'open-yt';
  const badge=document.getElementById('modalPlatformBadge');
  badge.textContent=isOdLike?'🟢 Odysee':'▶ YouTube';
  badge.className='platform-pill '+(isOdLike?'od-pill':'yt-pill');
  document.getElementById('videoModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('videoModal').classList.remove('open');
  document.getElementById('modalIframe').src='';
  document.body.style.overflow='';
}
document.getElementById('videoModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ══ INIT ══ */
currentVideos=shuffle(VIDEOS);
renderFilters();
applyLang(LANG);
</script>
