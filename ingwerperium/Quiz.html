h1, h2 { text-align: center; }

.wrong { background: #f44336 !important; }

.finish-btn {
    position: absolute; top: 15px; right: 15px;
    background: gold; color: black; font-weight: bold;
}
.timer { font-size: 20px; font-weight: bold; text-align: center; }
label { font-weight: bold; color: #333; }

/* top bar */
#topBar {
    position: fixed; top: 10px; left: 0; right: 0;

#backBtn {

.lang-toggle { display: flex; gap: 6px; }
.lang-toggle button {

.lang-toggle button.active,

.section-label { margin: 10px 0 4px; display: block; }

/* ─── LANGUAGE ─── */
let LANG = 'de';
(function(){
  const u = new URLSearchParams(window.location.search).get('lang');
  const s = localStorage.getItem('ingw-lang');
  const l = (u==='en'||u==='de') ? u : (s==='en'||s==='de') ? s : 'de';
  if(u) localStorage.setItem('ingw-lang', u);
  LANG = l;
})();
function applyLang(lang){
  LANG = lang;
  document.documentElement.lang = lang;
  localStorage.setItem('ingw-lang', lang);
  document.querySelectorAll('[data-de],[data-en]').forEach(el=>{
    const t = el.getAttribute('data-'+lang);
    if(t !== null) el.textContent = t;
  });
  // option elements
  document.querySelectorAll('option[data-de],option[data-en]').forEach(el=>{
    const t = el.getAttribute('data-'+lang);
    if(t !== null) el.textContent = t;
  });
  document.querySelectorAll('a[href]').forEach(a=>{
    const h = a.getAttribute('href');
    if(!h||h.startsWith('http')||h.startsWith('//')||h.startsWith('#')) return;
    const [p,q] = h.split('?');
    const params = new URLSearchParams(q||'');
    params.set('lang', lang);
    a.setAttribute('href', p+'?'+params.toString());
  });
  document.getElementById('btn-de').className = lang==='de' ? 'active' : '';
  document.getElementById('btn-en').className = lang==='en' ? 'active' : '';
}
window.switchLang = function(l){ applyLang(l); };
applyLang(LANG);

/* ─── GAME STATE ─── */
let players=[], scores=[], currentP=0, questions=[], limit=0, timerValue=0, points=1;
let interval=null, currentQ=null;

function getQ(q){ return q[LANG] || q.de; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function nameSetup(){
  const c = parseInt(document.getElementById('playerCount').value);
  const div = document.getElementById('nameInputs');
  div.innerHTML = '';
  for(let i=0;i<c;i++){
    const placeholder = LANG==='de' ? `Spieler ${i+1}` : `Player ${i+1}`;
    div.innerHTML += `<input id="n${i}" placeholder="${placeholder}"><br>`;
  }
  show('names');
}

function startGame(){
  const c = parseInt(document.getElementById('playerCount').value);
  players=[]; scores=[];
  for(let i=0;i<c;i++){
    const name = document.getElementById(`n${i}`).value.trim() ||
      (LANG==='de' ? `Spieler ${i+1}` : `Player ${i+1}`);
    players.push(name); scores.push(0);
  }
  limit       = parseInt(document.getElementById('questionLimit').value);
  timerValue  = parseInt(document.getElementById('timeLimit').value);
  points      = {leicht:1, mittel:2, schwer:3}[document.getElementById('difficulty').value];
  const cat   = document.getElementById('category').value;
  let all = [];
  if(cat==='all'){ for(let k in pool) all=all.concat(pool[k]); }
  else all = [...pool[cat]||[]];
  questions = shuffle(all);
  currentP = 0;
  show('game');
  nextQ();
}

document.addEventListener('keydown', e=>{
  if(e.code==='Space' && !document.getElementById('next').classList.contains('hidden')){
    e.preventDefault(); nextQ();
  }
});

function nextQ(){
  if(limit <= 0 || questions.length === 0){ finish(); return; }
  limit--;
  document.getElementById('info').classList.add('hidden');
  document.getElementById('next').classList.add('hidden');
  currentQ = questions.pop();
  const qData = getQ(currentQ);
  const pts = LANG==='de' ? 'Punkte' : 'pts';
  document.getElementById('turn').textContent = `${players[currentP]} (${scores[currentP]} ${pts})`;
  document.getElementById('question').textContent = qData.q;
  const answersDiv = document.getElementById('answers');
  answersDiv.innerHTML = '';
  qData.a.forEach((ans,i)=>{
    const btn = document.createElement('button');
    btn.className='answer-btn'; btn.textContent=ans;
    btn.onclick=()=>answer(i,qData);
    answersDiv.appendChild(btn);
  });
  startTimer();
}

function startTimer(){
  let t = timerValue;
  const td = document.getElementById('timer');
  td.textContent = `⏱ ${t}s`;
  clearInterval(interval);
  interval = setInterval(()=>{
    t--;
    td.textContent = `⏱ ${t}s`;
    if(t<=0){ clearInterval(interval); answer(-1, getQ(currentQ)); }
  },1000);
}

function answer(i, qData){
  clearInterval(interval);
  document.querySelectorAll('.answer-btn').forEach(b=>b.disabled=true);
  const infoDiv = document.getElementById('info');
  infoDiv.classList.remove('hidden','good','bad');
  if(i===qData.c){
    scores[currentP]+=points;
    infoDiv.classList.add('good');
    infoDiv.innerHTML=`✅ ${LANG==='de'?'Richtig':'Correct'}<br>${qData.i}`;
  } else {
    infoDiv.classList.add('bad');
    const corr = qData.a[qData.c];
    infoDiv.innerHTML=`❌ ${LANG==='de'?`Falsch! Richtig: ${corr}`:`Wrong! Correct: ${corr}`}<br>${qData.i}`;
  }
  document.getElementById('next').classList.remove('hidden');
  currentP = (currentP+1) % players.length;
}

function finish(){
  clearInterval(interval);
  show('result');
  const ranked = players.map((p,i)=>({p,s:scores[i]})).sort((a,b)=>b.s-a.s);
  const medals = ['🥇','🥈','🥉'];
  const pts = LANG==='de' ? 'Punkte' : 'pts';
  document.getElementById('ranking').innerHTML =
    ranked.map((r,i)=>`${medals[i]||`${i+1}.`} ${r.p} – ${r.s} ${pts}`).join('<br>');
}

function show(id){
  ['start','names','game','result'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  applyLang(LANG);
}
</script>
